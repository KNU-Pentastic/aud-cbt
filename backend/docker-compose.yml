services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aud
      POSTGRES_PASSWORD: aud
      POSTGRES_DB: aud_cbt
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aud -d aud_cbt"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://aud:aud@db:5432/aud_cbt
      DATABASE_URL_ASYNC: postgresql+asyncpg://aud:aud@db:5432/aud_cbt
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  db_data:
